services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: meeting-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: ${DB_PASSWORD:-1234}
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
